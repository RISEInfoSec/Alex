name: Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # GITHUB_TOKEN-authored pushes (e.g. from publish.yml's bot commit)
  # don't fire the `push` trigger by design — GitHub blocks downstream
  # workflows from token-authored pushes to prevent loops. So a standalone
  # `publish.yml` run leaves the site stale until someone manually
  # dispatches Pages. Bridge that gap by also firing on Publish completion.
  # (The full `Pipeline` workflow handles its own deploy job and doesn't
  # need this trigger.)
  workflow_run:
    workflows: ["Publish assets"]
    types: [completed]
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  # Use cancel-in-progress so a newer push supersedes an in-flight deploy
  # rather than queueing behind it. The previous `false` setting let the
  # queue wedge on 2026-04-25 — a stale `waiting` deployment from days
  # earlier blocked every subsequent run, and queued runs sat pending
  # for hours before being cancelled by the next push.
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    # When triggered by a workflow_run from Publish assets, only deploy if
    # that publish actually succeeded. Otherwise we'd redeploy on every
    # publish failure too, masking the problem.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run runs check out the SHA of the workflow that
          # triggered them by default — for us that's the SHA at the
          # start of the Publish run, before its bot commit landed. Pin
          # to `main` so we deploy whatever's currently on the branch.
          ref: main
      - name: Stage site files
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp data/papers.json _site/data/
          cp data/osint_cyber_papers.csv _site/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
