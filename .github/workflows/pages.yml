name: Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  # Use cancel-in-progress so a newer push supersedes an in-flight deploy
  # rather than queueing behind it. The previous `false` setting let the
  # queue wedge on 2026-04-25 — a stale `waiting` deployment from days
  # earlier blocked every subsequent run, and queued runs sat pending
  # for hours before being cancelled by the next push.
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - name: Stage site files
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp data/papers.json _site/data/
          cp data/osint_cyber_papers.csv _site/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
