name: Harvest all metadata automatically

on:
  workflow_dispatch:
  schedule:
    - cron: "31 3 * * 0"

permissions:
  contents: write

concurrency:
  group: harvest-all-metadata
  cancel-in-progress: false

jobs:
  harvest-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch:
          - { start: 1, end: 25 }
          - { start: 26, end: 50 }
          - { start: 51, end: 75 }
          - { start: 76, end: 100 }
          - { start: 101, end: 125 }
          - { start: 126, end: 150 }
          - { start: 151, end: 175 }
          - { start: 176, end: 200 }
          - { start: 201, end: 225 }

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Run harvester for batch
        env:
          HARVEST_MAILTO: ${{ secrets.HARVEST_MAILTO }}
        run: |
          python scripts/harvest_osint_metadata.py             --input osint_cyber_paper_library_206_v7_enriched.xlsx             --sheet Cyber_Corpus             --start-id "${{ matrix.batch.start }}"             --end-id "${{ matrix.batch.end }}"             --output osint_cyber_paper_library_harvested.xlsx             --cache .harvest_cache.json             --semantic-scholar

      - name: Replace canonical workbook
        run: mv osint_cyber_paper_library_harvested.xlsx osint_cyber_paper_library_206_v7_enriched.xlsx

      - name: Rebuild CSV and JSON for site
        run: |
          python - <<'PY'
          import json, pandas as pd
          from pathlib import Path
          repo = Path(".")
          df = pd.read_excel(repo / "osint_cyber_paper_library_206_v7_enriched.xlsx", sheet_name="Cyber_Corpus")
          (repo / "data").mkdir(exist_ok=True)
          df.to_csv(repo / "data" / "osint_cyber_papers.csv", index=False)

          def split_multi(v):
              if pd.isna(v): return []
              vals = []
              for x in str(v).replace("|",";").split(";"):
                  x = x.strip()
                  if x:
                      vals.append(x)
              seen, out = set(), []
              for x in vals:
                  k = x.lower()
                  if k not in seen:
                      seen.add(k)
                      out.append(x)
              return out

          papers = []
          for _, row in df.iterrows():
              doi = str(row.get("DOI","")).strip() if pd.notna(row.get("DOI","")) else ""
              src = str(row.get("Source_URL","")).strip() if pd.notna(row.get("Source_URL","")) else ""
              link = f"https://doi.org/{doi}" if doi else src
              papers.append({
                  "id": int(row["ID"]) if pd.notna(row["ID"]) else None,
                  "title": str(row.get("Title","")).strip(),
                  "author": str(row.get("Authors","")).strip(),
                  "year": int(row["Year"]) if pd.notna(row.get("Year")) else "",
                  "venue": str(row.get("Venue","")).strip(),
                  "summary": str(row.get("Abstract","")).strip(),
                  "keywords": split_multi(row.get("Keywords","")),
                  "osint_source": split_multi(row.get("OSINT_Source_Types","")),
                  "category": str(row.get("Category","")).strip(),
                  "investigation_type": str(row.get("Investigation_Type","")).strip(),
                  "tags": split_multi(row.get("Tags","")),
                  "link": link,
                  "source_url": src,
                  "doi": doi
              })
          (repo / "papers.json").write_text(json.dumps(papers, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Commit this batch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add osint_cyber_paper_library_206_v7_enriched.xlsx data/osint_cyber_papers.csv papers.json .harvest_cache.json
          git diff --cached --quiet || git commit -m "Harvest metadata batch ${{ matrix.batch.start }}-${{ matrix.batch.end }}"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
