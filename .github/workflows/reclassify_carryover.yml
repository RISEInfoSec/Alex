name: Reclassify carryover (one-shot)
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  reclassify:
    # One-shot: re-classify the carry-over corpus rows under the new strict
    # enum (post-#61). Intended to be deleted after a successful run; the
    # ongoing weekly Pipeline plus additive merge handles future runs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          OPENAI_API_KEY: ${{ secrets.OPEN_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: python scripts/reclassify_carryover.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/accepted_classified.csv
          git diff --cached --quiet || git commit -m "Reclassify carry-over corpus under strict enum"
          git push
