name: Discover
on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"
permissions:
  contents: write
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          HARVEST_MAILTO: ${{ secrets.HARVEST_MAILTO }}
          CORE_API_KEY: ${{ secrets.CORE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m alex.cli discover
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discovery_candidates.csv .alex_cache.json
          git diff --cached --quiet || git commit -m "Discover candidates"
          git push
